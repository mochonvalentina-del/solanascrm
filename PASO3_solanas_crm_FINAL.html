<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solanas CRM — Punta del Este</title>
<style>
  /* ── RESET & BASE ── */
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:14px}
  :root{
    --bg:#ffffff;--bg2:#f5f5f0;--bg3:#eeede8;
    --text:#1a1a1a;--text2:#6b6b6b;--text3:#9b9b9b;
    --border:#e0dfd8;--border2:#c8c7c0;
    --radius:8px;--radius-lg:12px;
    --uy-bg:#E1F5EE;--uy:#085041;
    --ar-bg:#E6F1FB;--ar:#0C447C;
    --admin-bg:#FAECE7;--admin:#712B13;
  }

  /* ── LAYOUT ── */
  .app{display:flex;height:100vh;overflow:hidden}
  .sidebar{width:200px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
  .content{flex:1;overflow-y:auto;padding:20px}

  /* ── SIDEBAR ── */
  .logo{padding:16px;border-bottom:1px solid var(--border)}
  .logo-t{font-size:14px;font-weight:600;color:var(--text)}
  .logo-s{font-size:11px;color:var(--text3);margin-top:2px}
  .user-blk{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer}
  .user-blk:hover{background:var(--bg)}
  .nav-sec{font-size:9px;text-transform:uppercase;letter-spacing:.09em;color:var(--text3);padding:10px 14px 3px;font-weight:600}
  .nav-i{display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:12px;cursor:pointer;color:var(--text2);transition:background .12s;border-right:2px solid transparent}
  .nav-i:hover{background:var(--bg);color:var(--text)}
  .nav-i.active{background:var(--bg);color:var(--text);font-weight:600;border-right-color:var(--text)}
  .nav-badge{background:#E24B4A;color:#fff;font-size:9px;font-weight:600;padding:1px 5px;border-radius:20px;margin-left:auto}

  /* ── TOPBAR ── */
  .topbar{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--bg);flex-shrink:0}
  .topbar-t{font-size:15px;font-weight:600;color:var(--text)}

  /* ── BUTTONS ── */
  .btn{font-size:12px;padding:6px 12px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;cursor:pointer;color:var(--text);font-family:inherit;transition:background .12s}
  .btn:hover{background:var(--bg2)}
  .btn-p{background:var(--text);color:#fff;border-color:var(--text)}
  .btn-p:hover{opacity:.85}
  .btn-wa{background:#128C7E;color:#fff;border-color:#128C7E;font-size:11px;padding:4px 9px}
  .btn-wa:hover{background:#0f7a6d}
  .btn-mail{background:#185FA5;color:#fff;border-color:#185FA5;font-size:11px;padding:4px 9px}
  .btn-danger{background:#FCEBEB;color:#A32D2D;border-color:#F09595}

  /* ── CARDS & METRICS ── */
  .card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px}
  .card-t{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text2);margin-bottom:10px}
  .metrics-g{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
  .mc{background:var(--bg2);border-radius:var(--radius);padding:12px}
  .mc-l{font-size:10px;color:var(--text2);margin-bottom:3px}
  .mc-v{font-size:22px;font-weight:700;color:var(--text)}
  .mc-s{font-size:10px;color:var(--text3);margin-top:2px}

  /* ── PILLS & TAGS ── */
  .pill{display:inline-flex;align-items:center;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap}
  .pill-uy{background:var(--uy-bg);color:var(--uy)}
  .pill-ar{background:var(--ar-bg);color:var(--ar)}
  .pill-admin{background:var(--admin-bg);color:var(--admin)}
  .pill-lider{background:#EEEDFE;color:#3C3489}
  .pill-vend{background:#F1EFE8;color:#444441}
  .tag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:600}
  .tag-hot{background:#FAECE7;color:#712B13}
  .tag-warm{background:#FAEEDA;color:#633806}
  .tag-cold{background:#E6F1FB;color:#0C447C}
  .tag-hab{background:#EAF3DE;color:#27500A}
  .tag-prod{background:#EEEDFE;color:#3C3489}
  .tag-orig{background:#F1EFE8;color:#444441}

  /* ── PIPELINE ── */
  .pipe-wrap{overflow-x:auto;padding-bottom:8px}
  .pipeline{display:flex;gap:10px;min-width:max-content}
  .s-col{width:150px;flex-shrink:0;display:flex;flex-direction:column;gap:7px}
  .s-hdr{padding:7px 9px;border-radius:var(--radius);display:flex;align-items:center;justify-content:space-between}
  .lcard{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px;cursor:pointer;transition:border-color .13s,box-shadow .13s}
  .lcard:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
  .lc-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
  .lc-sub{font-size:10px;color:var(--text2);margin-bottom:5px}

  /* ── FORM FIELDS ── */
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2)}
  .field input,.field select,.field textarea{font-size:12px;padding:7px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-family:inherit}
  .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#888}
  .form-g{display:grid;grid-template-columns:1fr 1fr;gap:12px;max-width:580px}
  .full{grid-column:1/-1}

  /* ── DETAIL ── */
  .back{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer;margin-bottom:14px}
  .back:hover{color:var(--text)}
  .avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
  .irow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px}
  .irow:last-child{border-bottom:none}
  .il{color:var(--text2)}
  .iv{color:var(--text);font-weight:600;font-size:11px;text-align:right;max-width:60%;overflow:hidden;text-overflow:ellipsis}
  .stage-btns{display:flex;flex-wrap:wrap;gap:5px}
  .sb{font-size:10px;padding:4px 10px;border-radius:20px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--text2);font-family:inherit}
  .sb:hover{border-color:var(--border2);color:var(--text)}
  .sb.on{background:var(--text);color:#fff;border-color:var(--text)}
  .tl-item{display:flex;gap:9px;padding:7px 0;border-bottom:1px solid var(--border);font-size:11px}
  .tl-item:last-child{border-bottom:none}
  .tl-dot{width:7px;height:7px;border-radius:50%;margin-top:3px;flex-shrink:0;background:var(--border2)}
  .note-in{width:100%;font-size:12px;padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg2);color:var(--text);resize:none;font-family:inherit}
  .note-in:focus{outline:none;border-color:#888}

  /* ── MENSAJES ── */
  .chat-wrap{display:flex;gap:12px;height:560px}
  .chat-sidebar{width:200px;flex-shrink:0;border:1px solid var(--border);border-radius:var(--radius-lg);overflow-y:auto;background:var(--bg)}
  .chat-main{flex:1;display:flex;flex-direction:column;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--bg)}
  .chat-hdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
  .chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;background:var(--bg2)}
  .bubble{max-width:75%;padding:8px 12px;border-radius:var(--radius-lg);font-size:12px;line-height:1.5}
  .b-in{background:var(--bg);border:1px solid var(--border);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px}
  .b-wa{background:#128C7E;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
  .b-mail{background:#185FA5;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
  .b-time{font-size:9px;opacity:.65;margin-top:3px}
  .chat-inp-wrap{padding:10px;border-top:1px solid var(--border);display:flex;gap:7px;align-items:flex-end;flex-shrink:0;background:var(--bg)}
  .contact-item{padding:10px;border-bottom:1px solid var(--border);cursor:pointer}
  .contact-item:hover,.contact-item.active{background:var(--bg2)}

  /* ── RECORDATORIOS ── */
  .rem-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:11px;display:flex;align-items:flex-start;gap:10px;margin-bottom:7px}
  .rem-item.overdue{border-left:3px solid #E24B4A;border-radius:0 var(--radius) var(--radius) 0}
  .rem-item.today{border-left:3px solid #EF9F27;border-radius:0 var(--radius) var(--radius) 0}
  .rem-item.done{opacity:.4}

  /* ── AUTOMATIZACIONES ── */
  .auto-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;margin-bottom:8px}
  .toggle{width:36px;height:20px;border-radius:20px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
  .toggle.on{background:#128C7E}
  .toggle.off{background:var(--border2)}
  .toggle-dot{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;transition:left .2s}
  .toggle.on .toggle-dot{left:18px}
  .toggle.off .toggle-dot{left:2px}
  .pending-item{background:#FAEEDA;border:1px solid #EF9F27;border-radius:var(--radius);padding:11px;margin-bottom:8px}

  /* ── PLANTILLAS ── */
  .tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .tpl-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px}
  .tpl-preview{font-size:11px;color:var(--text2);background:var(--bg2);padding:8px;border-radius:var(--radius);line-height:1.5;margin-bottom:10px;white-space:pre-wrap}
  .var-tag{background:#EEEDFE;color:#3C3489;font-size:10px;padding:1px 5px;border-radius:3px;font-family:monospace}

  /* ── LOGIN ── */
  .login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:var(--bg2);padding:24px}
  .login-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;width:100%;max-width:360px;margin-bottom:8px;transition:border-color .13s,box-shadow .13s}
  .login-card:hover{border-color:var(--border2);box-shadow:0 2px 8px rgba(0,0,0,.07)}

  /* ── LOADING ── */
  .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--text2);gap:12px}
  .spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .alert-banner{padding:10px 14px;border-radius:var(--radius);margin-bottom:12px;font-size:12px;line-height:1.5}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  /* TABLAS */
  .tbl{width:100%;border-collapse:collapse;font-size:12px}
  .tbl th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);padding:7px 10px;border-bottom:1px solid var(--border);text-align:left;background:var(--bg2)}
  .tbl td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle}
  .tbl tr:hover td{background:var(--bg2)}
  .sel{font-size:11px;padding:3px 7px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text);font-family:inherit;cursor:pointer}
</style>
</head>

function myLeads() {
  if (!STATE.user) return STATE.leads;
  const u = STATE.user;
  if (u.role === 'admin') return STATE.leads;
  if (u.role === 'lider') return STATE.leads.filter(l=>l.equipo===u.team);
  return STATE.leads.filter(l=>l.vendedor===u.id);
}

function vendedoresDe(team) {
  return STATE.users.filter(u=>u.role==='vendedor'&&u.team===team);
}

async function api(action, data={}) {
  if (!SCRIPT_URL || SCRIPT_URL.includes('PEGAR')) {
    // MODO DEMO — sin backend
    return demoApi(action, data);

  {id:'ar-v3',name:'Florencia Paz',role:'vendedor',team:'ar',color:'#444441',bg:'#F1EFE8'},

function demoApi(action, data) {
  if (action==='getUsers') return DEMO_USERS;
  if (action==='getLeads') return [...DEMO_LEADS];
  if (action==='getReminders') return [...DEMO_REMINDERS];
  if (action==='saveLead') {
    const lead = {...data, id: data.id || Date.now().toString(), creado: new Date().toISOString()};
    DEMO_LEADS.push(lead); return {ok:true, id:lead.id};
  }
  if (action==='updateLead') {
    const i = DEMO_LEADS.findIndex(l=>l.id===data.id);
    if (i>=0) DEMO_LEADS[i] = {...DEMO_LEADS[i], ...data};
    return {ok:true};
  }
  if (action==='addNote') {
    if (!DEMO_NOTES[data.leadId]) DEMO_NOTES[data.leadId] = [];
    DEMO_NOTES[data.leadId].unshift({id:Date.now().toString(),texto:data.texto,autor:data.autor,fecha:new Date().toLocaleString('es-AR')});
    const i = DEMO_LEADS.findIndex(l=>l.id===data.leadId);
    if (i>=0) DEMO_LEADS[i].interacted = true;
    return {ok:true};
  }
  if (action==='saveReminder') {
    DEMO_REMINDERS.push({...data, id:Date.now().toString(), done:false});
    return {ok:true};
  }
  if (action==='doneReminder') {
    const r = DEMO_REMINDERS.find(x=>x.id===data.id);
    if (r) r.done = true; return {ok:true};
  }
  return {error:'Demo: acción no reconocida'};
}

      <div class="card-t">Próximamente — conexión automática</div>
      <div style="font-size:12px;color:#6b6b6b;line-height:1.7">
        <b>Sistema de reservas:</b> Cuando el desarrollador conecte la API, los check-ins del día entrarán automáticamente al CRM en tiempo real.<br><br>
        <b>Meta Lead Ads:</b> Los leads de campañas de Facebook e Instagram entrarán directamente sin necesidad de exportar archivos.
      </div>
    </div>
  </div>`;
}

function handleFileImport(input) {
  alert('Función de importación disponible en la versión con backend conectado. Por ahora usá "Nuevo lead" para cargar manualmente.');
}

// ── ACCIONES ─────────────────────────────────────────────────
async function setStage(id, stage) {
  const l = STATE.leads.find(x=>x.id===id);
  if (!l) return;
  l.stage = stage;
  if (stage!=='nuevo') l.interacted = true;
  await api('updateLead', {id, stage, interacted:l.interacted});
  renderApp();
}

async function setHab(id, hab) {
  const l = STATE.leads.find(x=>x.id===id);
  if (!l) return;
  l.habitacion = hab;
  await api('updateLead', {id, habitacion:hab});
  renderApp();
}

async function setProd(id, prod) {
  const l = STATE.leads.find(x=>x.id===id);
  if (!l) return;
  l.producto = l.producto===prod ? '' : prod;
  await api('updateLead', {id, producto:l.producto});
  renderApp();
}

async function reasignar(lid, vid) {
  const l = STATE.leads.find(x=>x.id===lid);
  const v = uObj(vid);
  if (!l||!v) return;
  l.vendedor = vid;
  l.equipo = v.team;
  await api('updateLead', {id:lid, vendedor:vid, equipo:v.team});
  await api('addNote', {leadId:lid, texto:`Lead reasignado a ${v.name} por ${STATE.user.name}.`, autor:STATE.user.name});
  renderApp();
}

async function addNote(id) {
  const inp = $('note-inp');
  const text = inp?.value?.trim();
  if (!text) return;
  if (!STATE.notes[id]) STATE.notes[id] = [];
  if (!DEMO_NOTES[id]) DEMO_NOTES[id] = [];
  const nota = {id:Date.now().toString(), texto:text, autor:STATE.user.name, fecha:new Date().toLocaleString('es-AR')};
  STATE.notes[id].unshift(nota);
  DEMO_NOTES[id].unshift(nota);
  const l = STATE.leads.find(x=>x.id===id);
  if (l) l.interacted = true;
  await api('addNote', {leadId:id, texto:text, autor:STATE.user.name});
  renderApp();
}

async function saveReminder() {
  const leadId = $('r-lead')?.value;
  const texto  = $('r-text')?.value?.trim();
  if (!texto) { alert('Ingresá el texto del recordatorio.'); return; }
  const lead  = STATE.leads.find(l=>l.id===leadId);
  const fecha = $('r-fecha')?.value||'';
  const tipo  = $('r-tipo')?.value||'seguimiento';
  const dt    = fecha ? new Date(fecha) : new Date();
  const now   = new Date();
  const diff  = dt-now;
  const urgencia = diff<0?'overdue':diff<86400000?'today':'normal';
  const fechaLabel = urgencia==='overdue'?'Vencido':dt.toLocaleDateString('es-AR',{weekday:'short',hour:'2-digit',minute:'2-digit'});
  const rem = {id:Date.now().toString(),leadId,leadName:lead?.nombre||'Lead',texto,fecha:fechaLabel,tipo,done:false,vendedorId:STATE.user.id,urgencia};
  STATE.reminders.push(rem);
  await api('saveReminder', rem);
  go('recordatorios');
}

async function doneReminder(id) {
  const r = STATE.reminders.find(x=>x.id===id);
  if (r) r.done = true;
  await api('doneReminder', {id});
  renderApp();
}

function deleteReminder(id) {
  STATE.reminders = STATE.reminders.filter(x=>x.id!==id);
  renderApp();
}

async function guardarNuevoLead() {
  const nombre = $('f-name')?.value?.trim();
  if (!nombre) { alert('Ingresá el nombre del lead.'); return; }
  const origen = $('f-origen')?.value||'check-in';
  const equipo = $('f-equipo')?.value || (origen==='check-in'?'uy': STATE.user.team||'ar');
  const vendId = $('f-vend')?.value || STATE.user.id;
  const lead = {
    id: Date.now().toString(),
    nombre,
    email:$('f-email')?.value||'',
    tel:$('f-tel')?.value||'',
    origen,equipo,vendedor:vendId,
    stage:'nuevo',
    habitacion:$('f-hab')?.value||'',
    producto:$('f-prod')?.value||'',
    checkout:$('f-checkout')?.value||'',
    noches:0,
    budget:parseInt($('f-budget')?.value)||0,
    tags:$('f-tag')?.value||'warm',
    pais:$('f-pais')?.value||'Argentina',
    unidad:'',prod_orig:'',obs:'',interacted:false,
  };
  STATE.leads.push(lead);
  await api('saveLead', lead);
  await api('addNote',{leadId:lead.id,texto:`Lead registrado por ${STATE.user.name}. Origen: ${origen}.`,autor:STATE.user.name});
  go('pipeline');
}

function editTpl(id) { STATE.editTpl=id; go('nueva_plantilla'); }
function deleteTpl(id) { STATE.templates=STATE.templates.filter(t=>t.id!==id); renderApp(); }

function saveTpl() {
  const name = $('tp-name')?.value?.trim();
  const body = $('tp-body')?.value?.trim();
  if (!name||!body) { alert('Completá nombre y contenido.'); return; }
  const type  = $('tp-type')?.value||'wa';
  const stage = $('tp-stage')?.value||'nuevo';
  if (STATE.editTpl) {
    const t = STATE.templates.find(x=>x.id===STATE.editTpl);
    if (t) { t.name=name; t.body=body; t.type=type; t.stage=stage; }
  } else {
    STATE.templates.push({id:'t'+Date.now(),name,type,body,stage});
  }
  STATE.editTpl=null; go('plantillas');
}

function toggleAuto(id) {
  const a = STATE.automations.find(x=>x.id===id);
  if (a) a.on=!a.on;
  renderApp();
}

function approveMsg(id) {
  const p = STATE.pendingApprovals.find(x=>x.id===id);
  if (!p) return;
  if (!STATE.conversations[p.leadId]) STATE.conversations[p.leadId]=[];
  const now = new Date();
  STATE.conversations[p.leadId].push({dir:'out',text:p.msg,time:now.getHours()+':'+String(now.getMinutes()).padStart(2,'0'),canal:p.canal});
  STATE.pendingApprovals = STATE.pendingApprovals.filter(x=>x.id!==id);
  renderApp();
}
function rejectMsg(id) { STATE.pendingApprovals=STATE.pendingApprovals.filter(x=>x.id!==id); renderApp(); }
function editPending(id) {
  const p = STATE.pendingApprovals.find(x=>x.id===id);
  if (!p) return;
  STATE.activeChat=p.leadId;
  STATE.pendingApprovals=STATE.pendingApprovals.filter(x=>x.id!==id);
  go('mensajes');
  setTimeout(()=>{const i=$('msg-inp');if(i)i.value=p.msg;},100);
}

function loadTplInChat(leadId) {
  const sel = $('tpl-sel');
  const inp = $('msg-inp');
  if (!sel||!inp) return;
  const tpl = STATE.templates.find(t=>t.id===sel.value);
  const lead = STATE.leads.find(l=>l.id===leadId);
  if (!tpl||!lead) { inp.value=''; return; }
  const v = uObj(STATE.user.id);
  inp.value = tpl.body
    .replace(/{{nombre}}/g,lead.nombre.split(' ')[0])
    .replace(/{{vendedor}}/g,v?.name||STATE.user.name)
    .replace(/{{habitacion}}/g,lead.habitacion||lead.unidad||'')
    .replace(/{{producto}}/g,lead.producto||'nuestros productos');
}

function sendMsg(leadId) {
  const inp = $('msg-inp');
  const canal = $('canal-sel')?.value||'wa';
  if (!inp||!inp.value.trim()) return;
  if (!STATE.conversations[leadId]) STATE.conversations[leadId]=[];
  const now = new Date();
  STATE.conversations[leadId].push({dir:'out',text:inp.value.trim(),time:now.getHours()+':'+String(now.getMinutes()).padStart(2,'0'),canal});
  inp.value='';
  renderApp();
}

function openWA(id) {
  const l = STATE.leads.find(x=>x.id===id);
  if (l) window.open('https://wa.me/'+(l.tel||'').replace(/\D/g,''),'_blank');
}
function openMailLead(id) {
  const l = STATE.leads.find(x=>x.id===id);
  if (l&&l.email) window.open(`mailto:${l.email}?subject=Solanas Punta del Este`,'_blank');
}

// ── START ────────────────────────────────────────────────────
init();
</script>
